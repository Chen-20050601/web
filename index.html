<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三星堆数字博物馆</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/popper.js/1.15.0/umd/popper.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 全局：清除所有间距 */
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box;
        }
        body {
            background: #1D4700;
        }
        /* 导航 */
        .nav {
            width: 100%;
            height: 100px;
            background: #1D4700;
            position: relative;
            z-index: 999;
        }
        .nav ul {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            padding: 0 15% !important;
        }
        .nav a {
            color: #D4AF37 !important;
            font-size: 22px;
            text-decoration: none !important;
        }
        /* 视频：强制贴在导航下方，无任何间距 */
        .video-container {
            width: 100%;
            height: 700px;
            overflow: hidden;
            background: #000;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 要闻 */
        .dv {
            width: 95%;
            height: 200px;
            background: rgb(220,210,198);
            margin: 40px auto !important;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dv h3 {
            font-size: 40px;
            color: #1d4700;
            letter-spacing: 30px;
        }
        .container {
            width: 95%;
            background: rgb(220,210,198);
            margin: 30px auto !important;
            padding: 20px !important;
            border-radius: 15px;
        }
        .list {
            background: #fff;
            padding: 10px !important;
            border-radius: 10px;
        }
        .list li {
            height: 42px;
            line-height: 42px;
            border-bottom: 2px solid #aa343c;
        }
        .list a {
            color: #d1af74 !important;
            text-indent: 15px;
        }
        /* 展品 4×2 */
        .exhibit-row {
            display: flex;
            width: 100%;
        }
        .exhibit-item {
            flex: 1;
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .exhibit-item::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: #fff;
            font-size: 26px;
            writing-mode: vertical-rl;
            opacity: 0;
            transition: 0.4s;
        }
        .exhibit-item:hover::after {
            opacity: 1;
        }
        /* 返回顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #b89b7d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- 导航 -->
    <div class="nav">
        <ul>
            <li><a href="../web/核心展示.html">核心展示内容</a></li>
            <li><a href="../web/数字化体验.html">数字化体验</a></li>
            <li><a href="#">三星堆数字博物馆</a></li>
            <li><a href="../web/深入了解.html">深入了解</a></li>
            <li><a href="../web/博物馆推荐.html">博物馆推荐</a></li>
        </ul>
    </div>

    <!-- 视频：直接贴在导航下面，无间距！！！ -->
    <div class="video-container">
        <video autoplay muted loop>
            <source src="../web/视频1.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 要闻 -->
    <div class="dv"><h3>要闻</h3></div>
    <div class="container">
        <ul class="list">
            <li><a href="https://yangbo.cctv.com/2023/11/15/ARTIY73MXR3G9ZnVXnQb0lMV231115.shtml">走进古文明：三星堆的十件核心文物！</a></li>
            <li><a href="https://news.cnr.cn/native/gd/sz/20250621/t20250621_527223032.shtml">习语回响丨不断揭开三星堆的秘密</a></li>
            <li><a href="https://sichuan.scol.com.cn/ggxw/202307/58943629.html">总书记来到三星堆——"三星堆遗址考古成果在世界上是叫得响的"</a></li>
        </ul>
    </div>

    <!-- 展品 4×2 -->
    <div class="dv"><h3>经典展品</h3></div>
    <div class="exhibit-row">
        <div class="exhibit-item" style="background-image:url(../web/zongmu2.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/mianzhao.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/lirenxiang.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/qingtongshenshu.png)"></div>
    </div>
    <div class="exhibit-row">
        <div class="exhibit-item" style="background-image:url(../web/taiyangxingqi.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/yuzhang.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/huangjinmianju.png)"></div>
        <div class="exhibit-item" style="background-image:url(../web/jinzhang.png)"></div>
    </div>

    <div class="back-to-top">↑</div>

</body>
</html>
