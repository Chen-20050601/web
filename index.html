<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三星堆数字博物馆 - 首页改版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: #050812;
            color: #e6d7b9;
            overflow-x: hidden;
        }

        /* 数字化科技代码风边框容器 核心设计 */
        .digital-border-wrap {
            margin: 30px auto;
            width: 92%;
            max-width: 1400px;
            position: relative;
            /* 双层霓虹数字化边框 */
            border: 1px solid rgba(74, 222, 255, 0.3);
            padding: 4px;
            background: linear-gradient(135deg, rgba(20,30,50,0.9), rgba(8,12,25,0.95));
            border-radius: 12px;
            /* 光影动画 */
            box-shadow: 
                0 0 15px rgba(74, 222, 255, 0.2),
                inset 0 0 20px rgba(255, 215, 0, 0.08);
        }

        /* 四角代码切割装饰 数字化棱角 */
        .digital-border-wrap::before,
        .digital-border-wrap::after {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #4adeff;
            border-radius: 4px;
        }
        .digital-border-wrap::before {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }
        .digital-border-wrap::after {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }

        /* 动态扫描代码流光动画 */
        .scan-light {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(74,222,255,0.15), transparent);
            animation: scanMove 6s infinite linear;
        }
        @keyframes scanMove {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* 导航栏 - 内嵌数字化边框 */
        header {
            position: relative;
            z-index: 2;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(74,222,255,0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 8px rgba(255,215,0,0.5);
        }

        nav ul {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        nav a {
            color: #c9d8f0;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        nav a:hover {
            border: 1px solid rgba(74,222,255,0.4);
            color: #4adeff;
            box-shadow: 0 0 10px rgba(74,222,255,0.2);
        }

        /* 首页Banner 核心数字化视觉区 */
        .banner {
            height: 520px;
            background: url('https://img0.baidu.com/it/u=123456,789012&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=400') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 8px;
            overflow: hidden;
        }

        .banner-mask {
            position: absolute;
            inset: 0;
            background: rgba(5,8,18,0.75);
        }

        .banner-text {
            position: relative;
            z-index: 3;
        }

        .banner-text h1 {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 20px;
            letter-spacing: 6px;
            text-shadow: 0 0 12px rgba(255,215,0,0.4);
        }

        .banner-text p {
            font-size: 18px;
            color: #e6d7b9;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.8;
        }

        .digital-btn {
            padding: 14px 36px;
            border: 1px solid #4adeff;
            background: transparent;
            color: #4adeff;
            font-size: 17px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .digital-btn:hover {
            background: rgba(74,222,255,0.15);
            box-shadow: 0 0 18px rgba(74,222,255,0.35);
        }

        /* 文物展区 模块化数字化卡片边框 */
        .relic-section {
            padding: 60px 40px;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: "";
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4adeff, transparent);
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .relic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* 单张文物 代码风卡片边框 */
        .relic-card {
            background: rgba(10,15,30,0.8);
            border: 1px solid rgba(74,222,255,0.25);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
        }

        .relic-card:hover {
            transform: translateY(-8px);
            border-color: rgba(74,222,255,0.6);
            box-shadow: 0 10px 30px rgba(74,222,255,0.2);
        }

        .relic-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .relic-info {
            padding: 20px;
            border-top: 1px solid rgba(74,222,255,0.15);
        }

        .relic-info h3 {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .relic-info p {
            color: #b8c6e0;
            font-size: 14px;
            line-height: 1.7;
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(74,222,255,0.2);
            color: #8997b3;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- 全局数字化代码边框主容器 -->
    <div class="digital-border-wrap">
        <div class="scan-light"></div>
        
        <!-- 导航头部 -->
        <header>
            <div class="logo">三星堆数字文明博物馆</div>
            <nav>
                <ul>
                    <li><a href="#" class="active">首页</a></li>
                    <li><a href="#">数字文物</a></li>
                    <li><a href="#">线上沉浸展</a></li>
                    <li><a href="#">考古探秘</a></li>
                    <li><a href="#">互动体验</a></li>
                </ul>
            </nav>
        </header>

        <!-- 首页Banner区域 -->
        <section class="banner">
            <div class="banner-mask"></div>
            <div class="banner-text">
                <h1>千年古蜀 · 数字重生</h1>
                <p>依托数字化交互技术，解锁三星堆神秘古蜀文明，沉浸式体验青铜神树、黄金面具的千年传奇</p>
                <button class="digital-btn">进入数字沉浸展厅</button>
            </div>
        </section>

        <!-- 核心文物数字化展区 -->
        <section class="relic-section">
            <h2 class="section-title">数字馆藏精选</h2>
            <div class="relic-grid">
                <!-- 文物卡片1 -->
                <div class="relic-card">
                    <img src="https://img2.baidu.com/it/u=3029812121,1812345678&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=300" alt="黄金面具">
                    <div class="relic-info">
                        <h3>青铜大立人像</h3>
                        <p>三星堆国宝级文物，数字化3D扫描还原细节，解锁古蜀祭祀文化密码</p>
                    </div>
                </div>
                <!-- 文物卡片2 -->
                <div class="relic-card">
                    <img src="https://img1.baidu.com/it/u=2987654321,1234567890&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=300" alt="青铜神树">
                    <div class="relic-info">
                        <h3>青铜神树</h3>
                        <p>上古神话通天神木，数字光影动态演绎古蜀宇宙观与创世传说</p>
                    </div>
                </div>
                <!-- 文物卡片3 -->
                <div class="relic-card">
                    <img src="https://img0.baidu.com/it/u=1987654321,2345678901&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=300" alt="纵目面具">
                    <div class="relic-info">
                        <h3>纵目青铜面具</h3>
                        <p>神秘千里纵目，数字化AR交互，探寻古蜀先民超凡想象力</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer>
            <p>三星堆数字博物馆 © 2026 数字化沉浸式体验改版 | 古蜀文明数字传承</p>
        </footer>
    </div>
</body>
</html>
